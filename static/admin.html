<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Product Catalog</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <span class="nav-logo">📦 Product Finder</span>
      <a href="/" class="nav-link">Worker View</a>
    </div>
  </nav>

  <main class="container">
    <div class="hero">
      <h1>Product Catalog</h1>
      <p>All 50 Maxweld catalog pages. Workers upload a photo to find the matching page.</p>
    </div>

    <div class="list-header" style="margin-bottom:20px;">
      <h2>Catalog Pages <span class="count-badge" id="pageCount">0</span></h2>
      <input type="text" id="searchInput" class="search-input" placeholder="Search category…" />
    </div>

    <div id="pageGrid" class="page-grid">
      <p class="empty-msg">Loading…</p>
    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox-overlay hidden" id="lightbox">
    <div class="lightbox-inner">
      <button class="lightbox-close" id="lightboxClose">✕</button>
      <img id="lightboxImg" src="" alt="" />
    </div>
  </div>

  <script>
    const pageGrid   = document.getElementById('pageGrid');
    const pageCount  = document.getElementById('pageCount');
    const searchInput = document.getElementById('searchInput');
    const lightbox   = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');

    let allPages = [];

    async function loadPages() {
      const res = await fetch('/api/pages');
      allPages  = await res.json();
      pageCount.textContent = allPages.length;
      renderGrid(allPages);
    }

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.toLowerCase();
      renderGrid(allPages.filter(p =>
        p.category.toLowerCase().includes(q) ||
        String(p.page_number).includes(q) ||
        (p.product_codes || '').toLowerCase().includes(q)
      ));
    });

    function renderGrid(pages) {
      if (!pages.length) {
        pageGrid.innerHTML = '<p class="empty-msg">No pages found.</p>';
        return;
      }
      pageGrid.innerHTML = pages.map(p => `
        <div class="page-card" onclick="openPage('${esc(p.image_filename)}', ${p.page_number}, '${esc(p.category)}')">
          <img
            class="page-thumb"
            src="/static/catalog_pages/${esc(p.image_filename)}"
            alt="Page ${p.page_number}"
            loading="lazy"
          />
          <div class="page-card-info">
            <span class="page-num-badge">Page ${p.page_number}</span>
            <p class="page-cat">${esc(p.category)}</p>
          </div>
        </div>`).join('');
    }

    function openPage(filename, num, category) {
      lightboxImg.src = `/static/catalog_pages/${filename}`;
      lightboxImg.alt = `Page ${num} — ${category}`;
      lightbox.classList.remove('hidden');
    }

    document.getElementById('lightboxClose').addEventListener('click', () => {
      lightbox.classList.add('hidden');
      lightboxImg.src = '';
    });
    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) {
        lightbox.classList.add('hidden');
        lightboxImg.src = '';
      }
    });

    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadPages();
  </script>
</body>
</html>
